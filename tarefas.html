<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">    <link rel="stylesheet" href="css/estilos.css">
    <title>Tarefas Diárias</title>
    <script src="./tarefas.js" defer></script>
</head>

<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-sm-8" id="divBoard">
                <h1>Tarefas do Dia (a realizar)</h1>
                <form>
                <p><label for="inTask">Tarefa:</label>
                <input type="text" class="form-control" id="inTask" required autofocus>
                </p>
                <p><input type="submit" class="btn btn-primary" value="Adicionar &#10003;">
                <input type="button" class="btn btn-info" 
                value="Selecionar &#8645;" id="btSelect">
                <input type="button" class="btn btn-danger" 
                value="Retirar Selecionada &#10007;" id="btExclude">
                <input type="button" class="btn btn-success" 
                value="Gravar &#9673;" id="btRecord">
                </p>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
